<div class="min-h-screen text-white relative overflow-hidden">
  <!-- Progressive Blur Mask -->
  <div class="fixed top-0 left-0 w-full h-40 z-40 pointer-events-none bg-[#050505]/30 backdrop-blur-md" 
       style="-webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 100%); mask-image: linear-gradient(to bottom, black 30%, transparent 100%);"></div>

  <!-- Glow -->
  <app-planet-glow></app-planet-glow>

  <app-navbar></app-navbar>

  <router-outlet></router-outlet>
@if(showScrollTop){
  <button
    class="scroll-top"
    type="button"
    (click)="scrollToHero()"
    aria-label="Volver al inicio"
    >
    <!-- progreso (anillo) -->
    <svg class="scroll-ring" viewBox="0 0 44 44" aria-hidden="true">
      <circle class="ring-bg" cx="22" cy="22" r="18"></circle>
      <circle
        class="ring-fg"
        cx="22"
        cy="22"
        r="18"
        [style.stroke-dasharray]="ringCircumference"
        [style.stroke-dashoffset]="ringDashoffset"
      ></circle>
    </svg>
  
    <!-- ícono chevron -->
    <svg class="scroll-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M6 14l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  }
</div>
