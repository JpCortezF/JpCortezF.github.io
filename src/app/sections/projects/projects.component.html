<div class="max-w-[1600px] w-full mx-auto">
  <header class="flex flex-col items-start gap-3 mb-12 border-b border-white/10 pb-8">
    <!-- Capa 1: Indicador de Sistema -->
    <span class="font-mono text-xs md:text-sm text-cyan-400 tracking-wider">
      // 02. ARQUITECTURA & SISTEMAS
    </span>
    
    <!-- Capa 2: Título Principal -->
    <h2 class="text-4xl md:text-6xl font-hero font-extrabold text-white tracking-tight relative">
      PROYECTOS
      <!-- Resplandor sutil (Glow) -->
      <span class="absolute inset-0 bg-white blur-xl opacity-5 -z-10"></span>
    </h2>
    
    <!-- Capa 3: Subtítulo de Ingeniería -->
    <p class="max-w-3xl text-lg md:text-xl text-neutral-300 font-normal leading-relaxed mt-2">
      Sistemas modulares y escalables desarrollados de extremo a extremo: desde el modelado relacional y arquitectura backend en .NET hasta el despliegue contenerizado en producción.
    </p>
  </header>
  <div class="projects-grid grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-10"
      [class.slide-left]="pageAnim === 'slide-left'"
      [class.slide-right]="pageAnim === 'slide-right'">

    @for (p of pagedProjects; track p.name) {
      <app-project-card 
        [p]="p"
        (open)="openProject($event)"
      />
    }
  </div>

  <!-- ✅ PAGINACIÓN -->
  <div class="mt-10 flex items-center justify-between">
    <button
      type="button"
      (click)="prevPage()"
      [disabled]="page === 0"
      class="rounded-full px-4 py-2 text-sm font-semibold border border-white/15
             text-white/80 hover:text-white hover:border-white/30 transition
             disabled:opacity-30 disabled:hover:border-white/15 disabled:hover:text-white/80"
    >
      &lt; Volver
    </button>

    <span class="text-white/50 text-sm">
      {{ page + 1 }} / {{ totalPages }}
    </span>

    <button
      type="button"
      (click)="nextPage()"
      [disabled]="page >= totalPages - 1"
      class="cta-border inline-flex items-center gap-2 rounded-full px-5 py-2.5 text-sm font-semibold
            text-white transition disabled:opacity-30"
    >
      Ver más proyectos <span class="text-lg leading-none">&gt;</span>
    </button>
  </div>
</div>
