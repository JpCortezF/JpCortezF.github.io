<article 
  class="group relative flex flex-col justify-between w-full min-h-[500px] rounded-3xl overflow-hidden cursor-pointer bg-neutral-900/80 border border-white/10 hover:border-cyan-500/60 hover:shadow-[0_0_30px_rgba(6,182,212,0.2)] transition-all duration-500"
  (click)="open.emit(p)"
  [attr.aria-label]="'Ver expediente de ' + p.name"
>
  <!-- Background Image with Zoom Hover -->
  <div class="absolute inset-0 z-0 overflow-hidden rounded-3xl">
    <img 
      [src]="p.coverImage" 
      [alt]="p.name"
      [style.object-position]="p.coverPos || 'center'"
      class="w-full h-full object-cover object-center scale-100 group-hover:scale-105 transition-transform duration-700" 
    />
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-black/20 pointer-events-none"></div>
  </div>

  <!-- Top Bar: Tags -->
  <div class="relative z-10 flex flex-wrap gap-2 p-6 md:p-8">
    @for (t of p.tags; track t) {
      <span class="backdrop-blur-md bg-black/40 border border-white/15 rounded-full text-xs font-mono px-3 py-1 text-cyan-300">
        {{ t }}
      </span>
    }
  </div>

  <!-- Bottom Bar: Info & Action Button -->
  <div class="relative z-10 flex justify-between items-end gap-6 mt-auto p-6 md:p-8">
    
    <!-- Title and Description -->
    <div class="flex-1">
      <h3 class="text-2xl lg:text-3xl font-bold text-white mb-2 group-hover:text-cyan-300 transition-colors duration-300">
        {{ p.name }}
      </h3>
      <p class="text-neutral-300 text-sm md:text-base line-clamp-2 leading-relaxed">
        {{ p.description }}
      </p>
    </div>
    
    <!-- Circular Action Button -->
    <div class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center shrink-0 text-white group-hover:bg-cyan-500 group-hover:text-black group-hover:border-cyan-400 transition-all duration-300 transform group-hover:rotate-45">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <!-- Arrow up-right -->
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
      </svg>
    </div>
    
  </div>
</article>
